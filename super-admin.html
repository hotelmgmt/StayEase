<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase - Super Admin Control Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur p-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="bg-indigo-600 text-white p-2 rounded-lg font-bold text-xs"><i class="fa-solid fa-crown"></i></span>
        <span class="font-black tracking-wider text-white">StayEase Master Dashboard</span>
      </div>
      <span class="text-xs text-indigo-400 font-mono">SaaS Engine v1.0</span>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- होटल थप्ने फर्म -->
      <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
        <h3 class="text-sm font-bold text-indigo-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-plus mr-1"></i> नयाँ होटल दर्ता गर्नुहोस्</h3>
        <form onsubmit="saveHotel(event)" class="space-y-3">
          <div>
            <label class="text-[11px] text-slate-400 block mb-1">होटलको नाम</label>
            <input type="text" id="h-name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs focus:outline-none focus:border-indigo-500 text-white">
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">युजरनेम (एडमिन)</label>
              <input type="text" id="h-user" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
            </div>
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">पासवर्ड</label>
              <input type="text" id="h-pass" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">फोन नम्बर</label>
              <input type="text" id="h-phone" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
            </div>
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">इमेल</label>
              <input type="email" id="h-email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">प्लान (SaaS Package)</label>
              <select id="h-plan" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
                <option value="Standard">Standard</option>
                <option value="Premium">Premium</option>
                <option value="Enterprise">Enterprise</option>
              </select>
            </div>
            <div>
              <label class="text-[11px] text-slate-400 block mb-1">म्याद (Expiry Date)</label>
              <input type="date" id="h-expiry" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white focus:outline-none">
            </div>
          </div>
          <button type="submit" id="save-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-2.5 rounded-xl text-xs mt-3 transition cursor-pointer">होटल सुरक्षित गर्नुहोस्</button>
        </form>
      </div>

      <!-- होटलहरूको सूची तालिका -->
      <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl overflow-hidden">
        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-hotel mr-1"></i> आबद्ध होटलहरूको सूची</h3>
        
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-slate-800 text-slate-400 text-[11px] font-bold uppercase">
                <th class="pb-3">ID / नाम</th>
                <th class="pb-3">युजरनेम / फोन</th>
                <th class="pb-3">प्याकेज र म्याद</th>
                <th class="pb-3 text-right">अवस्था</th>
              </tr>
            </thead>
            <tbody id="hotel-table-body" class="text-xs divide-y divide-slate-800/60">
              <tr>
                <td colspan="4" class="py-8 text-center text-slate-500 font-medium">
                  <i class="fa-solid fa-spinner fa-spin mr-1 text-indigo-500"></i> डाटाबेस लोड हुँदैछ...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    // 🚨 यहाँ आफ्नो गुगल वेब एपको नयाँ लिङ्क हाल्नुहोस्
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby4FMkDTZNNMnYlKkxy6Hk-r0HMgRX70LoEzsWJwNozMnareKC59N1R1Ds8BAZekN95/exec";

    document.addEventListener("DOMContentLoaded", function() {
      loadMasterDashboard();
    });

    // डाटाबेसबाट सबै होटलहरू लोड गर्ने फङ्गसन
    function loadMasterDashboard() {
      fetch(GOOGLE_API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "fetchSuperAdmin" })
      })
      .then(res => res.json())
      .then(res => {
        const tbody = document.getElementById("hotel-table-body");
        tbody.innerHTML = "";
        
        if (!res.success || res.hotels.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-slate-600">कुनै पनि होटल फेला परेन।</td></tr>`;
          return;
        }

        res.hotels.forEach(h => {
          let statusBadge = h.status === "Active" 
            ? `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[10px] font-bold">Active</span>`
            : `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded text-[10px] font-bold">Inactive</span>`;

          tbody.innerHTML += `
            <tr class="hover:bg-slate-850/40 transition">
              <td class="py-3.5">
                <span class="font-mono text-[10px] bg-slate-800 text-slate-300 px-1.5 py-0.5 rounded border border-slate-700">${h.hotelId}</span>
                <div class="font-bold text-white mt-1">${h.hotelName}</div>
              </td>
              <td class="py-3.5 text-slate-300">
                <div><i class="fa-solid fa-user text-[10px] text-slate-500 mr-1"></i>${h.username}</div>
                <div class="text-[11px] text-slate-400 mt-0.5"><i class="fa-solid fa-phone text-[10px] text-slate-500 mr-1"></i>${h.phone}</div>
              </td>
              <td class="py-3.5">
                <span class="text-indigo-400 font-semibold text-[11px] block">${h.status === "Active" ? "Premium" : "Standard"}</span>
                <span class="text-slate-400 font-mono text-[11px] block mt-0.5"><i class="fa-solid fa-calendar-day text-[10px] text-slate-500 mr-1"></i>${h.expiry}</span>
              </td>
              <td class="py-3.5 text-right">${statusBadge}</td>
            </tr>
          `;
        });
      })
      .catch(err => {
        document.getElementById("hotel-table-body").innerHTML = `<tr><td colspan="4" class="py-6 text-center text-rose-400">कनेक्सन त्रुटि भयो!</td></tr>`;
      });
    }

    // नयाँ होटल सेभ गर्ने फङ्गसन
    function saveHotel(e) {
      e.preventDefault();
      document.getElementById("save-btn").innerText = "सुरक्षित हुँदैछ...";
      document.getElementById("save-btn").disabled = true;

      const hotelData = {
        name: document.getElementById("h-name").value,
        username: document.getElementById("h-user").value,
        password: document.getElementById("h-pass").value,
        phone: document.getElementById("h-phone").value,
        email: document.getElementById("h-email").value,
        plan: document.getElementById("h-plan").value,
        expiry: document.getElementById("h-expiry").value
      };

      fetch(GOOGLE_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "addHotel",
          hotelData: hotelData
        })
      })
      .then(res => res.json())
      .then(res => {
        alert(res.message);
        document.getElementById("h-name").value = "";
        document.getElementById("h-user").value = "";
        document.getElementById("h-pass").value = "";
        document.getElementById("h-phone").value = "";
        document.getElementById("h-email").value = "";
        
        document.getElementById("save-btn").innerText = "होटल सुरक्षित गर्नुहोस्";
        document.getElementById("save-btn").disabled = false;
        
        loadMasterDashboard(); // तालिका तुरुन्तै रिफ्रेस गर्ने
      })
      .catch(err => {
        alert("त्रुटि भयो, फेरि प्रयास गर्नुहोस्।");
        document.getElementById("save-btn").innerText = "होटल सुरक्षित गर्नुहोस्";
        document.getElementById("save-btn").disabled = false;
      });
    }
  </script>
</body>
</html>
