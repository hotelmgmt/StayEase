<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase - Partner Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-white">StayEase Partner Login</h2>
    </div>
    <div id="alert-box" class="mb-4 p-3 rounded-lg bg-rose-500/10 text-rose-400 text-sm hidden"></div>
    <form onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1">युजरनेम</label>
        <input type="text" id="username" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">पासवर्ड</label>
        <input type="password" id="password" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" id="btn" class="w-full bg-indigo-600 py-3 rounded-xl font-bold cursor-pointer">लगइन गर्नुहोस्</button>
    </form>
  </div>
  <script>
    // 🚨 यहाँ आफ्नो गुगल वेब एपको लिङ्क हाल्नुहोस्
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby4FMkDTZNNMnYlKkxy6Hk-r0HMgRX70LoEzsWJwNozMnareKC59N1R1Ds8BAZekN95/exec";

    function handleLogin(e) {
      e.preventDefault();
      document.getElementById("btn").innerText = "प्रमाणिकरण हुँदैछ...";
      
      fetch(GOOGLE_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "login",
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
        })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          localStorage.setItem("stayease_id", res.hotelId);
          localStorage.setItem("stayease_name", res.hotelName);
          localStorage.setItem("stayease_token", res.token);
          window.location.href = "admin-dashboard.html";
        } else {
          document.getElementById("alert-box").classList.remove("hidden");
          document.getElementById("alert-box").innerText = res.message;
          document.getElementById("btn").innerText = "लगइन गर्नुहोस्";
        }
      });
    }
  </script>
</body>
</html>
