<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase - Book Your Smart Room</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-12">

  <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 backdrop-blur-md bg-slate-900/80">
    <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="p-1.5 bg-indigo-600 rounded-lg text-white"><i class="fa-solid fa-bolt text-sm"></i></span>
        <h1 class="font-bold text-lg text-white tracking-tight" id="hotel-title">StayEase Hotel</h1>
      </div>
      <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md border border-slate-700">Client App v1.0</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-5 space-y-5">

    <div id="countdown-card" class="bg-gradient-to-r from-amber-600/20 to-amber-900/20 border border-amber-500/40 p-4 rounded-2xl hidden">
      <div class="flex justify-between items-start">
        <div>
          <h4 class="font-bold text-amber-400 text-sm flex items-center gap-1.5">
            <i class="fa-solid fa-hourglass-half animate-spin"></i> कोठा होल्ड गरिएको छ!
          </h4>
          <p class="text-xs text-slate-300 mt-1">काउन्टरमा गई यो गोप्य कोड देखाउनुहोस्:</p>
          <div class="text-2xl font-black tracking-widest text-white mt-1 bg-slate-950/60 px-3 py-1 rounded-xl inline-block border border-slate-800" id="display-otp">----</div>
        </div>
        <div class="text-right">
          <span class="text-[10px] text-amber-400 block uppercase font-bold">बाँकी समय</span>
          <span class="text-xl font-mono font-bold text-white block mt-0.5" id="timer-clock">15:00</span>
        </div>
      </div>
      <div id="digital-menu-section" class="mt-4 pt-3 border-t border-amber-500/20 hidden">
        <button onclick="openDigitalMenu()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-xs transition-all shadow-lg shadow-emerald-600/20 flex items-center justify-center gap-2 cursor-pointer">
          <i class="fa-solid fa-utensils"></i> 🍽️ View Hotel Food Menu (Checked-In)
        </button>
      </div>
    </div>

    <div id="customer-lost-found-section" class="bg-rose-950/30 border border-rose-900/60 p-4 rounded-2xl hidden">
      <h4 class="text-xs font-bold text-rose-400 uppercase tracking-wider flex items-center gap-1"><i class="fa-solid fa-suitcase"></i> कोठामै सामान छोड्नुभयो?</h4>
      <p class="text-[11px] text-slate-400 mt-0.5">यदि हजुरको सामान कोठामै छुटेको छ भने तुरुन्तै होटलको एडमिन ड्यासबोर्डमा सायरन पठाउनुहोस्।</p>
      <div class="mt-3 flex gap-2">
        <input type="text" id="lost-item-desc" placeholder="छुट्नुभएको सामानको विवरण (जस्तै: कालो ब्याग)" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-rose-500">
        <button onclick="sendEmergencyLostAlert()" class="bg-rose-600 hover:bg-rose-500 text-white font-semibold px-3 py-2 text-xs rounded-xl transition cursor-pointer">अलर्ट पठाउनुहोस्</button>
      </div>
    </div>

    <div class="space-y-3">
      <h3 class="text-sm font-bold text-slate-400 flex items-center gap-1.5"><i class="fa-solid fa-door-open"></i> उपलब्ध स्मार्ट कोठाहरू (Select Room)</h3>
      
      <div class="space-y-3" id="public-rooms-list">
        <div class="p-8 text-center text-slate-600 text-xs"><i class="fa-solid fa-spinner fa-spin mr-2"></i> होटलको कोठाहरू खोजिँदैछ...</div>
      </div>
    </div>

  </main>

  <script>
    // URL बाट Hotel ID लिने (जस्तै: ?hotel=H-01)
    const urlParams = new URLSearchParams(window.location.search);
    const hotelId = urlParams.get("hotel") || "H-01"; // डिफ्लोट H-01
    let activeInterval = null;
    let menuUrl = "";

    document.addEventListener("DOMContentLoaded", function() {
      loadHotelRooms();
      checkExistingBookingState();
      // हरेक १२ सेकेन्डमा ब्याकग्राउन्डमा स्टेटस चेक गरिरहने (Silent Background OTP authorization)
      setInterval(checkExistingBookingState, 12000);
    });

    // होटल र रुमको लाइभ डेटा लोड गर्ने
    function loadHotelRooms() {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            document.getElementById("hotel-title").innerText = res.hotel.name;
            renderRooms(res.rooms);
          }
        })
        .getHotelPublicData(hotelId);
    }

    function renderRooms(rooms) {
      const container = document.getElementById("public-rooms-list");
      container.innerHTML = "";
      
      if(rooms.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-slate-500 py-6">अहिले कुनै पनि कोठा उपलब्ध छैन।</p>`;
        return;
      }

      rooms.forEach(room => {
        let statusBadge = "";
        let actionButton = "";

        if(room.status === "Available") {
          statusBadge = `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[10px] font-bold">Available</span>`;
          actionButton = `<button onclick="bookThisRoom('${room.roomNumber}')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-xs px-4 py-2 rounded-xl transition cursor-pointer">Book Room</button>`;
        } else if(room.status === "Hold") {
          statusBadge = `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded text-[10px] font-bold">Hold (15m)</span>`;
          actionButton = `<button disabled class="bg-slate-800 text-slate-500 font-medium text-xs px-4 py-2 rounded-xl cursor-not-allowed">Locked</button>`;
        } else {
          statusBadge = `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded text-[10px] font-bold">Booked</span>`;
          actionButton = `<button disabled class="bg-slate-800 text-slate-500 font-medium text-xs px-4 py-2 rounded-xl cursor-not-allowed">Occupied</button>`;
        }

        container.innerHTML += `
          <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-4 flex gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-door-closed text-lg"></i>
              </div>
              <div>
                <h4 class="font-bold text-white text-sm">Room ${room.roomNumber}</h4>
                <p class="text-xs text-indigo-400 font-semibold mt-0.5">रु. ${room.price} / night</p>
                <div class="mt-1">${statusBadge}</div>
              </div>
            </div>
            <div>${actionButton}</div>
          </div>
        `;
      });
    }

    // कोठा बुकिङ प्रक्रिया सुरु गर्ने
    function bookThisRoom(roomNumber) {
      const name = prompt("कृपया आफ्नो पूरा नाम लेख्नुहोस्:");
      const phone = prompt("कृपया आफ्नो सम्पर्क मोबाइल नम्बर लेख्नुहोस्:");
      if(!name || !phone) return alert("बुकिङका लागि नाम र फोन नम्बर अनिवार्य छ।");

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            localStorage.setItem("stayease_my_room", roomNumber);
            localStorage.setItem("stayease_my_code", res.secretCode);
            localStorage.setItem("stayease_expiry", new Date().getTime() + 15 * 60 * 1000);
            
            checkExistingBookingState();
            loadHotelRooms();
          } else {
            alert(res.message);
          }
        })
        .createBookingRequest(hotelId, roomNumber, name, phone);
    }

    // ब्याकग्राउन्ड अटो-चेकिङ लजिक (Background Security Authorization Check)
    function checkExistingBookingState() {
      const myRoom = localStorage.getItem("stayease_my_room");
      const myCode = localStorage.getItem("stayease_my_code");
      
      if (!myRoom || !myCode) return;

      // १. काउन्टरमा होटलवालाले एप्रुभ गरेर चेक्ड-इन (Active) गर्‍यो कि गरेन ब्याकग्राउन्डमै चेक गर्ने
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.authorized) {
            // यदि ब्याकइन्डमा चेक-इन भइसक्यो भने काउन्टडाउन बक्स भित्र फूड मेनुको बटन अनलक गरिदिने
            document.getElementById("countdown-card").classList.remove("hidden");
            document.getElementById("digital-menu-section").classList.remove("hidden");
            document.getElementById("customer-lost-found-section").classList.remove("hidden"); // Lost & found पनि अन
            document.getElementById("display-otp").innerText = myCode + " (✓ Check-In Active)";
            menuUrl = res.menuUrl;
            if(activeInterval) clearInterval(activeInterval);
          } else {
            // यदि अझै चेक-इन भएको छैन भने डिफ्लोट १५ मिनेटको काउन्टडाउन चलाउने
            document.getElementById("countdown-card").classList.remove("hidden");
            document.getElementById("display-otp").innerText = myCode;
            startHoldTimer();
          }
        })
        .checkMenuAuthorization(hotelId, myRoom, myCode);
    }

    function startHoldTimer() {
      if(activeInterval) return;
      const expiry = localStorage.getItem("stayease_expiry");
      
      activeInterval = setInterval(function() {
        const now = new Date().getTime();
        const diff = expiry - now;

        if (diff <= 0) {
          clearInterval(activeInterval);
          localStorage.clear();
          document.getElementById("countdown-card").classList.add("hidden");
          loadHotelRooms();
        } else {
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          document.getElementById("timer-clock").innerText = 
            (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
        }
      }, 1000);
    }

    function openDigitalMenu() {
      if(menuUrl) {
        window.open(menuUrl, '_blank');
      } else {
        alert("मेनु उपलब्ध छैन।");
      }
    }

    // ग्राहकले बीच बाटोबाट सामान छुटेको इमर्जेन्सी रिपोर्ट पठाउने फङ्गसन
    function sendEmergencyLostAlert() {
      const myRoom = localStorage.getItem("stayease_my_room");
      const myCode = localStorage.getItem("stayease_my_code");
      const desc = document.getElementById("lost-item-desc").value;

      if(!desc) return alert("कृपया छुटेको सामानको विवरण लेख्नुहोस्।");

      google.script.run
        .withSuccessHandler(function(res) {
          alert(res.message);
          // सिधै ह्वाट्सएप डिप लिङ्किङ मार्फत होटललाई सेकेन्डरी अलर्ट पनि पठाउन ओपन गर्ने
          window.open(`https://wa.me/?text=🚨%20Emergency%20Alert:%20म%20Room%20${myRoom}%20को%20ग्राहक%20हुँ।%20मेरो%20कोठामा%20[${desc}]%20छुटेको%20छ,%20कृपया%20सुरक्षित%20राख्नुहोला।`, '_blank');
        })
        .reportLostItemByCustomer(hotelId, myRoom, myCode, desc);
    }
  </script>
</body>
</html>
