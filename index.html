<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase - Client Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-12">
  <header class="bg-slate-900 p-4 border-b border-slate-800 sticky top-0 z-50">
    <h1 class="font-bold text-center text-white" id="title">StayEase Booking</h1>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <div id="countdown-card" class="p-4 bg-amber-600/10 border border-amber-500/30 rounded-2xl hidden">
      <p class="text-xs text-amber-400">🔒 कोठा होल्ड कोड (देखाउनुहोस्):</p>
      <div class="text-2xl font-black text-white mt-1" id="display-otp">----</div>
      <div id="menu-section" class="mt-3 hidden">
        <button onclick="window.open(menuUrl, '_blank')" class="w-full bg-emerald-600 py-2 rounded-xl text-xs font-bold cursor-pointer">🍽️ View Food Menu</button>
      </div>
    </div>

    <div id="lost-section" class="p-4 bg-rose-950/40 border border-rose-900 rounded-2xl hidden">
      <span class="text-xs font-bold text-rose-400 block">🧳 सामान छुटेमा अलर्ट पठाउनुहोस्:</span>
      <div class="mt-2 flex gap-2">
        <input type="text" id="lost-desc" placeholder="सामानको नाम" class="flex-1 bg-slate-950 border border-slate-800 p-2 text-xs rounded-xl">
        <button onclick="sendLostAlert()" class="bg-rose-600 px-3 py-2 text-xs rounded-xl font-bold cursor-pointer">Send</button>
      </div>
    </div>

    <div class="space-y-2">
      <h3 class="text-xs text-slate-400 font-bold">उपलब्ध कोठाहरू छान्नुहोस्:</h3>
      <div id="rooms-list" class="space-y-2"></div>
    </div>
  </main>

  <script>
    // 🚨 यहाँ आफ्नो गुगल वेब एपको लिङ्क हाल्नुहोस्
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby4FMkDTZNNMnYlKkxy6Hk-r0HMgRX70LoEzsWJwNozMnareKC59N1R1Ds8BAZekN95/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const hotelId = urlParams.get("hotel") || "H-01";
    let menuUrl = "";

    document.addEventListener("DOMContentLoaded", function() {
      loadRooms(); checkState(); setInterval(checkState, 10000);
    });

    function loadRooms() {
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "getHotelData", hotelId: hotelId }) })
      .then(r => r.json()).then(res => {
        if(!res.success) return;
        document.getElementById("title").innerText = res.hotel.name;
        const list = document.getElementById("rooms-list"); list.innerHTML = "";
        res.rooms.forEach(r => {
          let isAvail = r.status === "Available";
          list.innerHTML += `<div class="p-4 bg-slate-900 border border-slate-850 rounded-2xl flex justify-between items-center"><div><span class="font-bold block text-sm">Room ${r.roomNumber}</span><span class="text-xs text-indigo-400">रु. ${r.price}</span></div><button ${isAvail?'':'disabled'} onclick="bookRoom('${r.roomNumber}')" class="px-3 py-1.5 text-xs rounded-xl font-bold ${isAvail?'bg-indigo-600':'bg-slate-800 text-slate-500'}">${isAvail?'Book':'Locked'}</button></div>`;
        });
      });
    }

    function bookRoom(num) {
      const name = prompt("नाम:"); const phone = prompt("फोन:");
      if(!name || !phone) return;
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "createBooking", hotelId: hotelId, roomNumber: num, customerName: name, customerPhone: phone }) })
      .then(r => r.json()).then(res => {
        if(res.success) {
          localStorage.setItem("my_room", num); localStorage.setItem("my_code", res.secretCode);
          checkState(); loadRooms();
        }
      });
    }

    function checkState() {
      const room = localStorage.getItem("my_room"); const code = localStorage.getItem("my_code");
      if(!room || !code) return;
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "checkMenu", hotelId: hotelId, roomNumber: room, secretCode: code }) })
      .then(r => r.json()).then(res => {
        document.getElementById("countdown-card").classList.remove("hidden");
        if(res.authorized) {
          document.getElementById("display-otp").innerText = code + " (✓ Checked-In)";
          document.getElementById("menu-section").classList.remove("hidden");
          document.getElementById("lost-section").classList.remove("hidden");
          menuUrl = res.menuUrl;
        } else {
          document.getElementById("display-otp").innerText = code;
        }
      });
    }

    function sendLostAlert() {
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "lostItemCustomer", hotelId: hotelId, roomNumber: localStorage.getItem("my_room"), secretCode: localStorage.getItem("my_code"), itemDetails: document.getElementById("lost-desc").value }) })
      .then(r => r.json()).then(res => { alert(res.message); });
    }
  </script>
</body>
</html>
