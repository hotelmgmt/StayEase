<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase - Hotel Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>.blink { animation: blk 1.2s linear infinite; } @keyframes blk { 50% { opacity: 0.3; } }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900 p-4 flex justify-between items-center">
    <span class="font-bold text-white" id="nav-title">होटल ड्यासबोर्ड</span>
    <button onclick="localStorage.clear(); window.location.href='admin-login.html'" class="text-xs text-slate-400">लगआउट</button>
  </nav>

  <main class="max-w-7xl mx-auto p-6 space-y-6">
    <div id="alarm" class="p-4 bg-rose-600/20 border border-rose-500 text-rose-300 rounded-xl flex justify-between items-center hidden">
      <div><h4 class="font-bold text-white">🚨 सामान छुटेको अलर्ट!</h4><p id="alarm-text" class="text-xs"></p></div>
      <button onclick="document.getElementById('alarm').classList.add('hidden')" class="text-xs bg-slate-900 px-3 py-1.5 rounded-lg">बुझेँ</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 bg-slate-800/40 p-6 rounded-2xl border border-slate-800">
        <h3 class="font-bold mb-4">कोठाहरूको लाइवे स्थिति</h3>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="grid"></div>
      </div>
      
      <div class="space-y-6">
        <div class="bg-slate-800/80 p-6 rounded-2xl border border-slate-800">
          <h3 class="font-bold text-indigo-400 mb-3 text-sm">काउन्टर चेक-इन (OTP)</h3>
          <div class="space-y-3">
            <input type="text" id="v-room" placeholder="कोठा नम्बर" class="w-full bg-slate-950 p-2 rounded-xl text-sm">
            <input type="text" id="v-otp" placeholder="४ अङ्कको कोड" class="w-full bg-slate-950 p-2 text-center text-amber-400 font-bold">
            <button onclick="verifyOtp()" class="w-full bg-emerald-600 py-2 rounded-xl text-sm cursor-pointer">Verify & Lock</button>
          </div>
        </div>

        <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-800 space-y-4">
          <h3 class="font-bold text-sm">होटल सेटिङ</h3>
          <label class="flex justify-between items-center">
            <span class="text-xs">WhatsApp Alerts Enable</span>
            <input type="checkbox" id="ws-toggle">
          </label>
          <input type="text" id="ws-num" placeholder="WhatsApp नम्बर" class="w-full bg-slate-950 p-2 rounded-xl text-xs">
          <input type="text" id="menu-url" placeholder="फूड मेनु URL" class="w-full bg-slate-950 p-2 rounded-xl text-xs">
          <button onclick="saveSettings()" class="w-full bg-indigo-600 py-2 rounded-xl text-xs cursor-pointer">सेभ गर्नुहोस्</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 🚨 यहाँ आफ्नो गुगल वेब एपको लिङ्क हाल्नुहोस्
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby4FMkDTZNNMnYlKkxy6Hk-r0HMgRX70LoEzsWJwNozMnareKC59N1R1Ds8BAZekN95/exec";
    const hotelId = localStorage.getItem("stayease_id");

    if(!hotelId) window.location.href = "admin-login.html";
    document.getElementById("nav-title").innerText = localStorage.getItem("stayease_name");

    document.addEventListener("DOMContentLoaded", function() {
      refreshData(); setInterval(refreshData, 10000);
    });

    function refreshData() {
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "fetchDashboard", hotelId: hotelId }) })
      .then(r => r.json()).then(res => {
        // ग्रिड रेन्डर गर्ने
        const g = document.getElementById("grid"); g.innerHTML = "";
        res.rooms.forEach(r => {
          let c = r.status==="Available"?"bg-emerald-500":r.status==="Hold"?"bg-amber-500":"bg-rose-600";
          g.innerHTML += `<div class="p-4 bg-slate-950 rounded-xl border border-slate-800 text-center"><div class="w-3 h-3 rounded-full ${c} mx-auto mb-2"></div><span class="text-sm font-bold">Room ${r.roomNumber}</span></div>`;
        });
        // अलर्ट बक्स
        if(res.alert) {
          document.getElementById("alarm").classList.remove("hidden");
          document.getElementById("alarm-text").innerText = `रुम ${res.alert.roomNumber} बाट ग्राहकको सामान [ ${res.alert.item} ] छुटेको रिपोर्ट आएको छ।`;
        }
      });
    }

    function verifyOtp() {
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "verifyOtp", hotelId: hotelId, roomNumber: document.getElementById("v-room").value, inputCode: document.getElementById("v-otp").value }) })
      .then(r => r.json()).then(res => { alert(res.message); refreshData(); });
    }

    function saveSettings() {
      fetch(GOOGLE_API_URL, { method: "POST", body: JSON.stringify({ action: "updateSettings", hotelId: hotelId, whatsAppEnabled: document.getElementById("ws-toggle").checked, whatsAppNumber: document.getElementById("ws-num").value, menuUrl: document.getElementById("menu-url").value }) })
      .then(r => r.json()).then(res => { alert("सेटिङ सुरक्षित भयो!"); });
    }
  </script>
</body>
</html>
